<!DOCTYPE html>
<html lang="ko" data-theme="bright">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="한얼 스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#9b8abf">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="app-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='12' width='56' height='48' rx='6' fill='none' stroke='%239b8abf' stroke-width='3'/%3E%3Crect x='4' y='12' width='56' height='14' rx='6' fill='%239b8abf'/%3E%3Cline x1='20' y1='6' x2='20' y2='18' stroke='%239b8abf' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='44' y1='6' x2='44' y2='18' stroke='%239b8abf' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='22' cy='38' r='3' fill='%2388aec8'/%3E%3Ccircle cx='32' cy='38' r='3' fill='%237cb5a0'/%3E%3Ccircle cx='42' cy='38' r='3' fill='%23c4929c'/%3E%3Ccircle cx='22' cy='50' r='3' fill='%23c4b07a'/%3E%3Ccircle cx='32' cy='50' r='3' fill='%2388aec8'/%3E%3Ccircle cx='42' cy='50' r='3' fill='%239b8abf'/%3E%3C/svg%3E">
<title>한얼 스케줄</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Nanum+Myeongjo:wght@400;700&display=swap');

  [data-theme="bright"] {
    --bg: #f4f1ed;--surface: #ffffff;--surface2: #f9f7f4;--border: #e0dbd5;--border-lt: #ece8e3;
    --text: #3a3530;--text-dim: #978f86;--text-faint: #c4bdb5;
    --accent: #9b8abf;--accent-soft: rgba(155,138,191,0.12);--accent-mid: rgba(155,138,191,0.25);--accent-fg: #fff;
    --mint: #7cb5a0;--mint-soft: rgba(124,181,160,0.12);
    --rose: #c4929c;--rose-soft: rgba(196,146,156,0.12);
    --gold: #c4b07a;--gold-soft: rgba(196,176,122,0.12);
    --sky: #88aec8;--sky-soft: rgba(136,174,200,0.12);
    --sh-sm: 0 1px 3px rgba(58,53,48,0.04);--sh-md: 0 4px 16px rgba(58,53,48,0.06);--sh-lg: 0 8px 32px rgba(58,53,48,0.10);
    --overlay: rgba(58,53,48,0.3);
  }

  [data-theme="dark"] {
    --bg: #18161e;--surface: #211f28;--surface2: #2a2832;--border: #37343e;--border-lt: #2f2d38;
    --text: #e6e2dc;--text-dim: #8e8898;--text-faint: #55505e;
    --accent: #b0a0d0;--accent-soft: rgba(176,160,208,0.12);--accent-mid: rgba(176,160,208,0.22);--accent-fg: #18161e;
    --mint: #8ccaae;--mint-soft: rgba(140,202,174,0.12);
    --rose: #d4a4ae;--rose-soft: rgba(212,164,174,0.12);
    --gold: #d4c48e;--gold-soft: rgba(212,196,142,0.12);
    --sky: #94b8d4;--sky-soft: rgba(148,184,212,0.12);
    --sh-sm: 0 1px 3px rgba(0,0,0,0.15);--sh-md: 0 4px 16px rgba(0,0,0,0.20);--sh-lg: 0 8px 32px rgba(0,0,0,0.30);
    --overlay: rgba(0,0,0,0.5);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;min-height:100dvh;font-size:14px;line-height:1.65;
    transition:background .4s,color .3s;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  input,select,textarea{-webkit-user-select:text;user-select:text}
  .app{max-width:640px;margin:0 auto;padding:28px 20px 100px}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
  .header-left h1{font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:700;letter-spacing:-.03em}
  .header-left h1 span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:8px}

  .icon-btn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .25s;box-shadow:var(--sh-sm);
  }
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--sh-md)}

  .sync-btn{
    height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-dim);font-size:12px;font-family:inherit;cursor:pointer;transition:all .25s;box-shadow:var(--sh-sm);
  }
  .sync-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sync-btn:disabled{opacity:.5;cursor:not-allowed}

  .tabs{display:flex;gap:4px;margin-bottom:24px}
  .tab{
    flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;
    color:var(--text-dim);background:transparent;border:none;
    border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all .25s;
  }
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-panel{display:none}.tab-panel.active{display:block}

  .card{
    background:var(--surface);border:1px solid var(--border-lt);border-radius:14px;
    padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh-sm);transition:all .25s;
  }
  .card:hover{box-shadow:var(--sh-md);border-color:var(--border)}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .card-title{font-weight:600;font-size:14.5px;letter-spacing:-.01em}
  .card-meta{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card-actions{display:flex;gap:4px}

  .btn-sm{
    background:transparent;border:1px solid var(--border);color:var(--text-dim);
    padding:4px 10px;border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s;
  }
  .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
  .btn-sm.danger:hover{border-color:var(--rose);color:var(--rose)}

  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:500;letter-spacing:.02em}
  .badge-routine{background:var(--sky-soft);color:var(--sky)}
  .badge-event{background:var(--mint-soft);color:var(--mint)}
  .badge-cancelled{background:var(--rose-soft);color:var(--rose);text-decoration:line-through}
  .badge-modified{background:var(--gold-soft);color:var(--gold)}
  .badge-care{background:var(--accent-soft);color:var(--accent)}

  .care-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;letter-spacing:.02em}
  .care-ok{background:var(--mint-soft);color:var(--mint)}
  .care-soon{background:var(--gold-soft);color:var(--gold)}
  .care-overdue{background:var(--rose-soft);color:var(--rose)}
  .care-scheduled{background:var(--sky-soft);color:var(--sky)}
  .care-habit{background:var(--accent-soft);color:var(--accent)}

  .mode-toggle{display:flex;gap:4px;margin-bottom:12px}
  .mode-btn{
    flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:500;
    color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);
    border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .mode-btn.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .consecutive-fields{display:none}
  .consecutive-fields.show{display:flex;gap:12px}
  .weekly-fields.hide{display:none}

  .tag-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tag-chip{
    padding:5px 12px;border-radius:8px;font-size:11.5px;font-weight:500;
    background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .tag-chip:hover{border-color:var(--accent);color:var(--accent)}
  .tag-chip.active{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .consecutive-badge{font-size:12px;color:var(--accent);font-weight:500;margin-top:10px}

  .care-progress{margin-top:8px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .care-progress-bar{height:100%;border-radius:2px;transition:width .3s}
  .care-progress-bar.ok{background:var(--mint)}
  .care-progress-bar.soon{background:var(--gold)}
  .care-progress-bar.overdue{background:var(--rose)}

  .taste-group{margin-bottom:20px}
  .taste-group-header{
    font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:600;
    color:var(--text);letter-spacing:-.01em;
    padding:6px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .taste-count{
    font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:400;
    color:var(--text-faint);background:var(--surface2);
    padding:1px 7px;border-radius:8px;
  }
  .taste-rating{margin-left:8px;color:var(--gold);font-size:12px;letter-spacing:1px}
  .card-pending{opacity:.6;position:relative}
  .card-pending::after{content:'동기화 중…';position:absolute;top:8px;right:8px;font-size:10px;color:var(--text-faint)}

  .humor-content{white-space:pre-wrap;word-break:break-word;line-height:1.55;color:var(--text);font-size:13.5px;margin-top:6px}
  .humor-tag{display:inline-block;font-size:10.5px;color:var(--text-dim);background:var(--surface2);padding:1px 7px;border-radius:6px;margin-right:4px;margin-top:4px}

  .day-chips{display:flex;gap:5px;margin-top:10px}
  .day-chip{
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text-faint);transition:all .2s;
  }
  .day-chip.active{background:var(--accent-soft);color:var(--accent);font-weight:600}

  .form-overlay{
    display:none;position:fixed;inset:0;background:var(--overlay);z-index:100;
    align-items:flex-end;justify-content:center;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .form-overlay.open{display:flex}
  .form-panel{
    background:var(--surface);border-top:1px solid var(--border);
    border-radius:20px 20px 0 0;width:100%;max-width:640px;
    padding:28px 24px calc(32px + env(safe-area-inset-bottom));
    max-height:85vh;overflow-y:auto;box-shadow:var(--sh-lg);
  }
  .form-title{font-family:'Nanum Myeongjo',serif;font-size:17px;font-weight:700;margin-bottom:24px}
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:11.5px;font-weight:500;color:var(--text-dim);margin-bottom:7px;letter-spacing:.03em}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:11px 14px;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:all .25s;
    box-sizing:border-box;
  }
  .form-group textarea{resize:vertical;min-height:80px;line-height:1.5}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .form-row{display:flex;gap:12px}.form-row .form-group{flex:1}

  .day-selector{display:flex;gap:6px}
  .day-toggle{
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;font-size:13px;font-weight:500;
    background:var(--bg);color:var(--text-dim);border:1px solid var(--border);
    cursor:pointer;transition:all .2s;font-family:inherit;
  }
  .day-toggle.selected{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}

  .form-actions{display:flex;gap:8px;margin-top:24px}
  .btn{
    flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;
    font-family:inherit;cursor:pointer;border:none;transition:all .25s;
  }
  .btn-primary{background:var(--accent);color:var(--accent-fg);box-shadow:0 2px 8px var(--accent-soft)}
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed}
  .btn-secondary{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
  .btn-secondary:hover{color:var(--text);border-color:var(--text-dim)}

  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .week-nav-btn{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    width:34px;height:34px;border-radius:10px;font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:inherit;
    transition:all .2s;box-shadow:var(--sh-sm);
  }
  .week-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .week-label{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700}

  .day-section{margin-bottom:14px}
  .day-header{
    font-size:12px;font-weight:500;color:var(--text-dim);padding:8px 2px 6px;
    display:flex;justify-content:space-between;align-items:center;letter-spacing:.02em;
  }
  .day-header.today{color:var(--accent);font-weight:600}

  .week-item{
    display:flex;align-items:center;gap:12px;padding:10px 14px;
    background:var(--surface);border-radius:10px;margin-bottom:4px;
    border-left:3px solid transparent;box-shadow:var(--sh-sm);transition:all .2s;
  }
  .week-item:hover{box-shadow:var(--sh-md)}
  .week-item.routine{border-left-color:var(--sky)}
  .week-item.event{border-left-color:var(--mint)}
  .week-item.cancelled{border-left-color:var(--rose);opacity:.5}
  .week-item.modified{border-left-color:var(--gold)}
  .week-item-time{font-size:12px;color:var(--text-dim);min-width:100px;font-variant-numeric:tabular-nums}
  .week-item-title{font-size:13px;flex:1}
  .week-item.cancelled .week-item-title{text-decoration:line-through}

  .empty-day{padding:6px 14px;font-size:12px;color:var(--text-faint)}
  .empty-state{text-align:center;padding:48px 20px;color:var(--text-dim);font-size:13px}

  .add-fab{
    position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));right:28px;
    width:50px;height:50px;border-radius:15px;
    background:var(--accent);color:var(--accent-fg);font-size:22px;border:none;cursor:pointer;
    box-shadow:0 4px 20px var(--accent-mid);display:flex;align-items:center;justify-content:center;
    transition:all .25s;z-index:50;
  }
  .add-fab:hover{transform:translateY(-2px);box-shadow:0 6px 28px var(--accent-mid)}

  .toast{
    position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));left:50%;
    transform:translateX(-50%) translateY(12px);
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:10px 20px;border-radius:12px;font-size:13px;opacity:0;
    transition:all .3s;z-index:200;pointer-events:none;box-shadow:var(--sh-lg);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .loading{text-align:center;padding:24px;color:var(--text-dim);font-size:13px}
  .via-cal{font-size:10px;color:var(--text-faint);font-style:italic}

  /* ── 할일 보드 (Google Tasks 스타일 카드 가로 정렬) ── */
  .todo-board{
    display:flex;gap:12px;overflow-x:auto;padding:4px 4px 12px;margin:0 -4px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  }
  .todo-board::-webkit-scrollbar{height:6px}
  .todo-board::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .todo-board::-webkit-scrollbar-track{background:transparent}

  .todo-card{
    flex:0 0 280px;min-width:280px;scroll-snap-align:start;
    background:var(--surface);border:1px solid var(--border-lt);border-radius:14px;
    padding:14px 12px 10px;box-shadow:var(--sh-sm);
    display:flex;flex-direction:column;max-height:70vh;
  }
  .todo-card.color-mint{border-top:3px solid var(--mint)}
  .todo-card.color-sky{border-top:3px solid var(--sky)}
  .todo-card.color-rose{border-top:3px solid var(--rose)}
  .todo-card.color-gold{border-top:3px solid var(--gold)}
  .todo-card.color-accent{border-top:3px solid var(--accent)}
  .todo-card.color-lavender{border-top:3px solid var(--accent)}

  .todo-card-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 4px 10px;margin-bottom:6px;border-bottom:1px solid var(--border-lt);
  }
  .todo-card-title{
    font-family:'Nanum Myeongjo',serif;font-size:14.5px;font-weight:700;
    color:var(--text);letter-spacing:-.01em;flex:1;cursor:pointer;
  }
  .todo-card-count{
    font-family:'Noto Sans KR',sans-serif;font-size:10.5px;font-weight:400;
    color:var(--text-faint);background:var(--surface2);padding:1px 7px;border-radius:8px;
    margin:0 6px;
  }
  .todo-card-menu{
    background:transparent;border:none;color:var(--text-faint);cursor:pointer;
    width:24px;height:24px;border-radius:6px;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .todo-card-menu:hover{background:var(--surface2);color:var(--text)}

  .todo-card-body{
    flex:1;overflow-y:auto;min-height:40px;
    margin:0 -4px;padding:0 4px;
  }
  .todo-card-body::-webkit-scrollbar{width:4px}
  .todo-card-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .todo-item{
    display:flex;align-items:flex-start;gap:8px;padding:6px 4px;
    border-radius:6px;transition:background .15s;position:relative;
  }
  .todo-item:hover{background:var(--surface2)}
  .todo-item.child{padding-left:26px}
  .todo-item.done .todo-text{color:var(--text-faint);text-decoration:line-through}

  .todo-check{
    flex-shrink:0;width:16px;height:16px;border:1.5px solid var(--text-faint);
    border-radius:50%;cursor:pointer;margin-top:3px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;background:transparent;
  }
  .todo-check:hover{border-color:var(--accent)}
  .todo-check.checked{background:var(--accent);border-color:var(--accent)}
  .todo-check.checked::after{
    content:'';width:8px;height:4px;border-left:1.5px solid var(--accent-fg);
    border-bottom:1.5px solid var(--accent-fg);transform:rotate(-45deg) translate(1px,-1px);
  }

  .todo-text{
    flex:1;font-size:13px;line-height:1.45;color:var(--text);cursor:pointer;
    word-break:break-word;white-space:pre-wrap;padding:1px 0;
  }
  .todo-text-edit{
    flex:1;font-size:13px;line-height:1.45;color:var(--text);
    background:var(--bg);border:1px solid var(--accent);border-radius:6px;
    padding:4px 8px;outline:none;font-family:inherit;
  }

  .todo-actions{
    display:none;gap:2px;flex-shrink:0;
  }
  .todo-item:hover .todo-actions{display:flex}
  .todo-action{
    background:transparent;border:none;color:var(--text-faint);cursor:pointer;
    width:22px;height:22px;border-radius:5px;font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .todo-action:hover{background:var(--surface);color:var(--text)}
  .todo-action.add-child{color:var(--text-dim)}
  .todo-action.add-child:hover{color:var(--accent)}
  .todo-action.remove:hover{color:var(--rose)}

  .todo-add-row{
    display:flex;align-items:center;gap:8px;padding:8px 4px 4px;
    border-top:1px solid var(--border-lt);margin-top:6px;
    color:var(--text-dim);cursor:pointer;font-size:12.5px;
  }
  .todo-add-row:hover{color:var(--accent)}
  .todo-add-row-icon{font-size:14px;line-height:1}

  .todo-add-input{
    width:100%;background:var(--bg);border:1px solid var(--accent);color:var(--text);

<script>
var API_URL='https://script.google.com/a/macros/somaandbody.com/s/AKfycbz23iMsMa7QiETq50kVDTj8KUtRoSzBqsZZhkDCqC7ZZmlyFjv5IqJ6E_KAKyZT3IFI/exec';
var currentWeekDate=new Date(),currentEventMonth=new Date(),routinesCache=[],eventsCache=[],caresCache=[],tastesCache=[],humorsCache=[],todoListsCache=[],todosCache=[],isSaving=false,routineMode='weekly',careFilterTag='',tasteFilterCat='',tasteRating=0,humorFilterTag='';

function toggleTheme(){
  var h=document.documentElement,n=h.getAttribute('data-theme')==='bright'?'dark':'bright';
  h.setAttribute('data-theme',n);localStorage.setItem('scheduleTheme',n);
  document.getElementById('themeIcon').textContent=n==='bright'?'☀':'☾';
  document.querySelector('meta[name=theme-color]').content=n==='bright'?'#9b8abf':'#18161e';
}
function loadTheme(){var s=localStorage.getItem('scheduleTheme')||'bright';document.documentElement.setAttribute('data-theme',s);document.getElementById('themeIcon').textContent=s==='bright'?'☀':'☾'}

function apiGet(p){return fetch(API_URL+'?'+new URLSearchParams(p)).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){console.error('API:',t);throw new Error('API 응답 오류')}})}
function apiWrite(action,data,id){var p={action:action};if(data)p.data=JSON.stringify(data);if(id)p.id=id;return fetch(API_URL+'?'+new URLSearchParams(p)).then(function(r){return r.text()}).then(function(t){var j;try{j=JSON.parse(t)}catch(e){console.error('API raw:',t.substring(0,500));throw new Error('API 응답 파싱 실패')}if(j.error)throw new Error(j.error);return j})}

// localStorage 캐시 헬퍼 (꺼내쓰기 편하게)
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function loadLS(k){try{var s=localStorage.getItem(k);return s?JSON.parse(s):null}catch(e){return null}}

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

function switchTab(n){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===n)});document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.toggle('active',p.id==='panel-'+n)});if(n==='week')loadWeekView();else if(n==='routine')loadRoutines();else if(n==='event')loadEvents();else if(n==='care')loadCares();else if(n==='taste')loadTastes();else if(n==='humor')loadHumors();else if(n==='todo')loadTodos()}

var DAY_NAMES=['일','월','화','수','목','금','토'];
function getMonday(d){var dt=new Date(d);dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return dt}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function changeWeek(dir){currentWeekDate.setDate(currentWeekDate.getDate()+dir*7);loadWeekView()}

function loadWeekView(){
  var c=document.getElementById('weekView');
  var mon=getMonday(currentWeekDate),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById('weekLabel').textContent=(mon.getMonth()+1)+'월 '+mon.getDate()+'일 — '+(sun.getMonth()+1)+'월 '+sun.getDate()+'일';
  // 캐시 적중 시 즉시 렌더 (현재 주간만)
  var cached=loadLS('weekViewCache');
  var monStr=formatDate(mon);
  if(cached&&cached.weekStart===monStr)renderWeekView(cached,mon);
  else c.innerHTML='<div class="loading">불러오는 중...</div>';
  apiGet({action:'getWeekView',date:formatDate(currentWeekDate)}).then(function(d){
    saveLS('weekViewCache',d);renderWeekView(d,mon);
  }).catch(function(){if(!cached||cached.weekStart!==monStr)c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>'});
}

function renderWeekView(data,monday){
  var c=document.getElementById('weekView'),today=formatDate(new Date());
  if(!data.items||!data.items.length){c.innerHTML='<div class="empty-state">이번 주 일정이 없습니다.</div>';return}
  var g={};for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);g[formatDate(d)]=[]}
  data.items.forEach(function(it){if(g[it.date])g[it.date].push(it)});
  var h='';
  Object.entries(g).forEach(function(entry){
    var date=entry[0],items=entry[1],d=new Date(date+'T00:00:00'),dn=DAY_NAMES[d.getDay()],isT=date===today;
    h+='<div class="day-section"><div class="day-header'+(isT?' today':'')+'"><span>'+dn+'요일'+(isT?' · 오늘':'')+'</span><span>'+(d.getMonth()+1)+'/'+d.getDate()+'</span></div>';
    if(!items.length)h+='<div class="empty-day">—</div>';
    else items.forEach(function(it){
      var cls='week-item',bc='badge-event',bt='일정';
      if(it.status==='cancelled'){cls+=' cancelled';bc='badge-cancelled';bt='취소'}

function setRoutineMode(mode){

  document.getElementById('modeWeekly').classList.toggle('active',mode==='weekly');
  document.getElementById('modeConsecutive').classList.toggle('active',mode==='consecutive');
  document.getElementById('modeInterval').classList.toggle('active',mode==='interval');
  var wf=document.querySelectorAll('.weekly-fields'),cf=document.getElementById('consecutiveFields'),inf=document.getElementById('intervalFields');
  wf.forEach(function(el){el.classList.toggle('hide',mode!=='weekly')});
  cf.classList.toggle('show',mode==='consecutive');
  inf.classList.toggle('show',mode==='interval');

function isIntervalRoutine(r){return r.dayOfWeek&&r.dayOfWeek.indexOf('간격:')=== 0}
function getIntervalDays(r){return parseInt(r.dayOfWeek.split(':')[1])||1}
function isConsecutiveRoutine(r){
  if(isIntervalRoutine(r))return false;
  var allDays='월,화,수,목,금,토,일';
  var days=r.dayOfWeek.split(',').map(function(d){return d.trim()}).sort().join(',');
  var sorted=allDays.split(',').sort().join(',');
  return days===sorted&&r.startDate&&r.endDate;
}
function getConsecutiveDays(r){
  var s=new Date(r.startDate+'T00:00:00'),e=new Date(r.endDate+'T00:00:00');
  return Math.round((e-s)/(1000*60*60*24))+1;
}

function saveRoutine(){
  var id=document.getElementById('routineEditId').value,title=document.getElementById('routineTitle').value.trim(),
    st=document.getElementById('routineStart').value,et=document.getElementById('routineEnd').value;
  var dayOfWeek,startDate,endDate;
  if(routineMode==='interval'){
    var intStart=document.getElementById('routineIntervalStart').value,intDays=parseInt(document.getElementById('routineIntervalDays').value);
    if(!title||!st||!et||!intStart||!intDays){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek='간격:'+intDays;startDate=intStart;endDate='';
  }else if(routineMode==='consecutive'){
    var consecStart=document.getElementById('routineConsecStart').value,consecDays=parseInt(document.getElementById('routineConsecDays').value);
    if(!title||!st||!et||!consecStart||!consecDays){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek='월,화,수,목,금,토,일';startDate=consecStart;
    var ed=new Date(consecStart+'T00:00:00');ed.setDate(ed.getDate()+consecDays-1);endDate=formatDate(ed);
  }else{
    var sd=[];document.querySelectorAll('#daySelector .day-toggle.selected').forEach(function(b){sd.push(b.dataset.day)});
    if(!title||!st||!et||!sd.length){showToast('모든 항목을 입력해주세요.');return}
    dayOfWeek=sd.join(',');startDate=document.getElementById('routineStartDate').value||'';endDate=document.getElementById('routineEndDate').value||'';
  }
  var data={title:title,startTime:st,endTime:et,dayOfWeek:dayOfWeek,startDate:startDate,endDate:endDate,address:document.getElementById('routineAddress').value||'',memo:document.getElementById('routineMemo').value||''};
  // 낙관적 업데이트
  var tempId,prevState;
  if(id){
    var idx=routinesCache.findIndex(function(r){return r.id===id});
    if(idx>=0){prevState=Object.assign({},routinesCache[idx]);Object.assign(routinesCache[idx],data)}
  } else {
    tempId='temp_'+Date.now();
    routinesCache.push(Object.assign({id:tempId,calendarEventId:'',_pending:true},data));
  }
  saveLS('routinesCache',routinesCache);renderRoutines();closeForm('routineFormOverlay');
  // 백그라운드 동기화 (캘린더 부수효과는 백엔드가 처리)
  var p;if(id){data.id=id;p=apiWrite('updateRoutine',data)}else{p=apiWrite('addRoutine',data)}
  p.then(function(r){
    if(tempId&&r.id){
      var idx=routinesCache.findIndex(function(rr){return rr.id===tempId});
      if(idx>=0){routinesCache[idx].id=r.id;routinesCache[idx].calendarEventId=r.calendarEventId||'';delete routinesCache[idx]._pending;saveLS('routinesCache',routinesCache);renderRoutines()}
    }
    // 루틴 변경은 주간뷰에 영향 → 주간뷰 캐시 무효화
    localStorage.removeItem('weekViewCache');
  }).catch(function(e){
    if(tempId){
      var idx=routinesCache.findIndex(function(rr){return rr.id===tempId});
      if(idx>=0)routinesCache.splice(idx,1);
    } else if(prevState){
      var idx=routinesCache.findIndex(function(rr){return rr.id===id});
      if(idx>=0)routinesCache[idx]=prevState;
    }
    saveLS('routinesCache',routinesCache);renderRoutines();
    showToast('저장 실패: '+e.message);
  });
}

function getCareStatus(care){
  var cycle=parseInt(care.cycle);
  if(!cycle){return {label:'습관',cls:'habit',progress:0,isHabit:true}}
  var today=new Date();today.setHours(0,0,0,0);
  var lastDone=care.lastDone?new Date(care.lastDone+'T00:00:00'):null,nextDate=care.nextDate?new Date(care.nextDate+'T00:00:00'):null;
  var daysSince=lastDone?Math.floor((today-lastDone)/(1000*60*60*24)):null;
  var daysUntilDue=lastDone?cycle-daysSince:null;
  var daysUntilNext=nextDate?Math.floor((nextDate-today)/(1000*60*60*24)):null;
  var progress=daysSince!==null?Math.min(daysSince/cycle,1):1;
  var label,cls;
  if(daysSince===null&&nextDate===null){label='미완료';cls='overdue'}
  else if(daysSince!==null&&daysUntilDue>30){label='정상 ('+daysUntilDue+'일 남음)';cls='ok'}
  else if(daysSince!==null&&daysUntilDue>0&&daysUntilDue<=30){
    if(nextDate){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
    else{label='임박 ('+daysUntilDue+'일 남음)';cls='soon'}
  }
  else if(daysSince!==null&&daysUntilDue<=0){
    if(nextDate&&daysUntilNext>=0){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
    else{label='주의 ('+Math.abs(daysUntilDue)+'일 초과)';cls='overdue'}
  }
  else if(nextDate){label='예정 ('+formatDate(nextDate)+')';cls='scheduled'}
  else{label='주의';cls='overdue'}
  return {label:label,cls:cls,progress:progress,isHabit:false};
}

  }

  else c.innerHTML='<div class="loading">불러오는 중...</div>';
  // 백그라운드 갱신 (실패해도 캐시 유지). pending 항목은 보존
  apiGet({action:'getTastes'}).then(function(d){
    var pending=tastesCache.filter(function(t){return t._pending});
    tastesCache=d.concat(pending);
    saveTasteCache();renderTastes();
  }).catch(function(){

  });

function saveTasteCache(){saveLS('tastesCache',tastesCache)}
function renderTastes(){
  var c=document.getElementById('tasteList');
  if(!tastesCache.length){c.innerHTML='<div class="empty-state">등록된 취향이 없습니다. 영화, 음악, 전시 등을 추가해보세요.</div>';return}
  // 카테고리 목록 수집
  var cats=[];
  tastesCache.forEach(function(t){if(t.category&&cats.indexOf(t.category)===-1)cats.push(t.category)});
  // 정해진 순서대로 정렬, 없는 건 끝에
  var order=['영화','음악','전시','책','기타'];
  cats.sort(function(a,b){var ia=order.indexOf(a),ib=order.indexOf(b);if(ia===-1&&ib===-1)return a.localeCompare(b);if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib});
  // 필터 chip
  var chipHtml='<div class="tag-filter"><button class="tag-chip'+(tasteFilterCat===''?' active':'')+'" onclick="setTasteFilter(\'\')">전체</button>';
  cats.forEach(function(t){chipHtml+='<button class="tag-chip'+(tasteFilterCat===t?' active':'')+'" onclick="setTasteFilter(\''+t+'\')">'+t+'</button>'});
  chipHtml+='</div>';
  // 필터 적용 후 카테고리별 그룹핑
  var filtered=tasteFilterCat?tastesCache.filter(function(t){return t.category===tasteFilterCat}):tastesCache;
  var groups={};
  filtered.forEach(function(t){var k=t.category||'기타';if(!groups[k])groups[k]=[];groups[k].push(t)});
  // 정렬: 별점 높은 순, 그 다음 추가일시 최신순
  Object.keys(groups).forEach(function(k){
    groups[k].sort(function(a,b){if(b.rating!==a.rating)return b.rating-a.rating;return (b.addedAt||'').localeCompare(a.addedAt||'')});
  });
  var renderOrder=cats.filter(function(k){return groups[k]});
  var html=chipHtml;
  renderOrder.forEach(function(cat){
    html+='<div class="taste-group"><div class="taste-group-header">'+cat+' <span class="taste-count">'+groups[cat].length+'</span></div>';
    groups[cat].forEach(function(t){
      var stars=t.rating?'<span class="taste-rating">'+'★'.repeat(t.rating)+'</span>':'';
      var sub=t.subtitle?'<div class="card-meta" style="margin-top:4px">'+t.subtitle+'</div>':'';
      var memo=t.memo?'<div class="card-meta" style="margin-top:4px;color:var(--text-faint)">'+t.memo+'</div>':'';
      var added=t.addedAt?'<div class="card-meta" style="margin-top:4px;color:var(--text-faint);font-size:11px">추가: '+t.addedAt+'</div>':'';
      var pendingMark=t._pending?' card-pending':'';
      html+='<div class="card'+pendingMark+'"><div class="card-header"><span class="card-title">'+t.title+stars+'</span><div class="card-actions"><button class="btn-sm" onclick="editTaste(\''+t.id+'\')">수정</button><button class="btn-sm danger" onclick="removeTaste(\''+t.id+'\')">삭제</button></div></div>'+sub+memo+added+'</div>';
    });
    html+='</div>';
  });
  c.innerHTML=html;
}

// === 할일 (리스트업, 캘린더 연동 없음) ===
// 데이터 모델: todoListsCache (카드들) + todosCache (모든 항목)
// 항목의 parentId가 비어있으면 top-level, 값 있으면 하위 항목 (2단계까지만)

function saveTodoCache(){saveLS('todoListsCache',todoListsCache);saveLS('todosCache',todosCache)}

function loadTodos(){
  var c=document.getElementById('todoBoard');
  // 캐시 있으면 즉시 렌더
  if(!todoListsCache.length){var s1=loadLS('todoListsCache');if(s1)todoListsCache=s1}
  if(!todosCache.length){var s2=loadLS('todosCache');if(s2)todosCache=s2}
  if(todoListsCache.length)renderTodoBoard();
  else c.innerHTML='<div class="loading">불러오는 중...</div>';

  // 서버에서 최신 데이터 가져오기 (병렬)
  Promise.all([
    apiGet({action:'getTodoLists'}),
    apiGet({action:'getTodos'})
  ]).then(function(r){
    var lists=Array.isArray(r[0])?r[0]:[];
    var todos=Array.isArray(r[1])?r[1]:[];
    var pendingLists=todoListsCache.filter(function(l){return l._pending});
    var pendingTodos=todosCache.filter(function(t){return t._pending});
    todoListsCache=lists.concat(pendingLists);
    todosCache=todos.concat(pendingTodos);
    saveTodoCache();renderTodoBoard();
  }).catch(function(){
    if(!todoListsCache.length)c.innerHTML='<div class="empty-state">데이터를 불러올 수 없습니다.</div>';
  });
}

function renderTodoBoard(){
  var c=document.getElementById('todoBoard');
  // 리스트 정렬 (order 오름차순)
  var sorted=todoListsCache.slice().sort(function(a,b){return (a.order||0)-(b.order||0)});
  var html=sorted.map(function(l){return renderTodoCard(l)}).join('');
  // 끝에 "+ 새 리스트" 카드
  html+='<div class="todo-new-list-card" onclick="promptNewTodoList()">+ 새 리스트</div>';
  c.innerHTML=html;
}

function renderTodoCard(list){
  // 이 리스트의 항목들 (parentId 기준 트리 구성)
  var items=todosCache.filter(function(t){return t.listId===list.id});
  items.sort(function(a,b){return (a.order||0)-(b.order||0)});
  var tops=items.filter(function(t){return !t.parentId});

  var bodyHtml=tops.map(function(t){
    var children=items.filter(function(c){return c.parentId===t.id});
    children.sort(function(a,b){return (a.order||0)-(b.order||0)});
    return renderTodoItem(t,false)+children.map(function(c){return renderTodoItem(c,true)}).join('');
  }).join('');

  if(!bodyHtml)bodyHtml='<div class="empty-day" style="padding:14px 4px">비어있음</div>';

  // 미완료 항목 수
  var pendingCount=items.filter(function(t){return !t.done}).length;
  var countBadge=pendingCount>0?'<span class="todo-card-count">'+pendingCount+'</span>':'';

  var colorClass='color-'+(list.color||'accent');
  return '<div class="todo-card '+colorClass+'" data-list-id="'+escapeHtml(list.id)+'">'
    +'<div class="todo-card-header">'
      +'<span class="todo-card-title" onclick="renameTodoList(\''+escapeHtml(list.id)+'\')">'+escapeHtml(list.name)+'</span>'
      +countBadge
      +'<button class="todo-card-menu" onclick="openTodoListMenu(event,\''+escapeHtml(list.id)+'\')">⋮</button>'
    +'</div>'
    +'<div class="todo-card-body" id="todoBody_'+escapeHtml(list.id)+'">'+bodyHtml+'</div>'
    +'<div class="todo-add-row" onclick="showAddTodoInput(\''+escapeHtml(list.id)+'\',\'\')">'
      +'<span class="todo-add-row-icon">+</span><span>할 일 추가</span>'
    +'</div>'
  +'</div>';
}

function renderTodoItem(t,isChild){
  var pendingClass=t._pending?' card-pending':'';
  var doneClass=t.done?' done':'';
  var childClass=isChild?' child':'';
  var checkedClass=t.done?' checked':'';
  var addChildBtn=isChild?'':'<button class="todo-action add-child" onclick="event.stopPropagation();showAddTodoInput(\''+escapeHtml(t.listId)+'\',\''+escapeHtml(t.id)+'\')" title="하위 항목 추가">↳</button>';
  return '<div class="todo-item'+doneClass+childClass+pendingClass+'" data-todo-id="'+escapeHtml(t.id)+'">'
    +'<div class="todo-check'+checkedClass+'" onclick="toggleTodoDone(\''+escapeHtml(t.id)+'\')"></div>'
    +'<div class="todo-text" onclick="editTodoStart(\''+escapeHtml(t.id)+'\')">'+escapeHtml(t.text)+'</div>'
    +'<div class="todo-actions">'
      +addChildBtn
      +'<button class="todo-action remove" onclick="event.stopPropagation();removeTodo(\''+escapeHtml(t.id)+'\')" title="삭제">×</button>'
    +'</div>'
  +'</div>';
}

// ── 할일 항목 CRUD ──

function toggleTodoDone(id){
  var idx=todosCache.findIndex(function(t){return t.id===id});
  if(idx<0)return;
  var prev=todosCache[idx].done;
  todosCache[idx].done=!prev;
  saveTodoCache();renderTodoBoard();
  apiWrite('updateTodo',{id:id,done:todosCache[idx].done}).catch(function(e){
    // 롤백
    var i=todosCache.findIndex(function(t){return t.id===id});
    if(i>=0){todosCache[i].done=prev;saveTodoCache();renderTodoBoard()}
    showToast('상태 변경 실패: '+e.message);
  });
}

function showAddTodoInput(listId,parentId){
  // 기존 입력 필드 제거
  var existing=document.getElementById('todoAddInput');
  if(existing)existing.parentNode.removeChild(existing);

  var body=document.getElementById('todoBody_'+listId);
  if(!body)return;
  var wrap=document.createElement('div');
  wrap.id='todoAddInput';
  wrap.style.padding='6px 4px';
  if(parentId)wrap.style.paddingLeft='30px';
  var input=document.createElement('input');
  input.className='todo-add-input';
  input.placeholder=parentId?'하위 할 일':'할 일';
  wrap.appendChild(input);
  body.appendChild(wrap);
  input.focus();

  // Enter = 저장, Esc = 취소, blur = 비어있으면 취소
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();var v=input.value.trim();if(v){saveNewTodo(listId,parentId,v);input.value='';input.focus()}else{wrap.remove()}}
    else if(e.key==='Escape'){wrap.remove()}
  });
  input.addEventListener('blur',function(){setTimeout(function(){if(!input.value.trim())wrap.remove()},150)});
}

function saveNewTodo(listId,parentId,text){
  var tempId='temp_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  var siblings=todosCache.filter(function(t){return t.listId===listId && (t.parentId||'')===(parentId||'')});
  var nextOrder=siblings.length>0?Math.max.apply(null,siblings.map(function(t){return t.order||0}))+1:0;
  todosCache.push({id:tempId,listId:listId,parentId:parentId||'',text:text,done:false,order:nextOrder,_pending:true});
  saveTodoCache();renderTodoBoard();
  // 다시 입력 필드 띄움 (연속 추가 편의)
  showAddTodoInput(listId,parentId);
  apiWrite('addTodo',{listId:listId,parentId:parentId||'',text:text,order:nextOrder}).then(function(r){
    var idx=todosCache.findIndex(function(t){return t.id===tempId});
    if(idx>=0 && r.id){todosCache[idx].id=r.id;delete todosCache[idx]._pending;saveTodoCache();renderTodoBoard()}
  }).catch(function(e){
    var idx=todosCache.findIndex(function(t){return t.id===tempId});
    if(idx>=0){todosCache.splice(idx,1);saveTodoCache();renderTodoBoard()}
    showToast('추가 실패: '+e.message);
  });
}

function editTodoStart(id){
  var item=document.querySelector('[data-todo-id="'+id+'"]');
  if(!item)return;
  var textEl=item.querySelector('.todo-text');
  if(!textEl)return;
  var current=todosCache.find(function(t){return t.id===id});
  if(!current)return;
  var input=document.createElement('input');
  input.className='todo-text-edit';
  input.value=current.text;
  textEl.parentNode.replaceChild(input,textEl);
  input.focus();
  input.setSelectionRange(input.value.length,input.value.length);
  var commit=function(save){
    var newText=input.value.trim();
    if(save && newText && newText!==current.text)editTodoSave(id,newText);
    else renderTodoBoard();
  };
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commit(true)}
    else if(e.key==='Escape'){commit(false)}
  });
  input.addEventListener('blur',function(){commit(true)});
}

function editTodoSave(id,newText){
  var idx=todosCache.findIndex(function(t){return t.id===id});
  if(idx<0)return;
  var prev=todosCache[idx].text;
  todosCache[idx].text=newText;
  saveTodoCache();renderTodoBoard();
  apiWrite('updateTodo',{id:id,text:newText}).catch(function(e){
    var i=todosCache.findIndex(function(t){return t.id===id});
    if(i>=0){todosCache[i].text=prev;saveTodoCache();renderTodoBoard()}
    showToast('수정 실패: '+e.message);
  });
}

function removeTodo(id){
  var t=todosCache.find(function(t){return t.id===id});
  if(!t)return;
  var hasChildren=todosCache.some(function(c){return c.parentId===id});
  var msg=hasChildren?'이 항목과 하위 항목까지 삭제할까요?':'삭제할까요?';
  if(!confirm(msg))return;
  // 낙관적 삭제: target과 자식 모두 제거
  var removed=todosCache.filter(function(t){return t.id===id||t.parentId===id});
  todosCache=todosCache.filter(function(t){return t.id!==id && t.parentId!==id});
  saveTodoCache();renderTodoBoard();
  apiWrite('deleteTodo',null,id).catch(function(e){
    // 롤백
    todosCache=todosCache.concat(removed);saveTodoCache();renderTodoBoard();
    showToast('삭제 실패: '+e.message);
  });
}

// ── 할일 리스트 (카드) CRUD ──

function promptNewTodoList(){
  var name=prompt('새 리스트 이름','새 리스트');
  if(!name||!name.trim())return;
  name=name.trim();
  var tempId='temp_'+Date.now();
  var nextOrder=todoListsCache.length>0?Math.max.apply(null,todoListsCache.map(function(l){return l.order||0}))+1:0;
  var colors=['mint','sky','rose','gold','accent','lavender'];
  var color=colors[todoListsCache.length%colors.length];
  todoListsCache.push({id:tempId,name:name,order:nextOrder,color:color,_pending:true});
  saveTodoCache();renderTodoBoard();
  // 할일 탭이 아니면 이동
  if(document.querySelector('.tab.active').dataset.tab!=='todo')switchTab('todo');
  apiWrite('addTodoList',{name:name,order:nextOrder,color:color}).then(function(r){
    var idx=todoListsCache.findIndex(function(l){return l.id===tempId});
    if(idx>=0 && r.id){todoListsCache[idx].id=r.id;delete todoListsCache[idx]._pending;saveTodoCache();renderTodoBoard()}
  }).catch(function(e){
    var idx=todoListsCache.findIndex(function(l){return l.id===tempId});
    if(idx>=0){todoListsCache.splice(idx,1);saveTodoCache();renderTodoBoard()}
    showToast('리스트 생성 실패: '+e.message);
  });
}

function renameTodoList(id){
  var l=todoListsCache.find(function(l){return l.id===id});
  if(!l)return;
  var newName=prompt('리스트 이름',l.name);
  if(!newName||!newName.trim()||newName.trim()===l.name)return;
  newName=newName.trim();
  var prev=l.name;
  l.name=newName;saveTodoCache();renderTodoBoard();
  apiWrite('updateTodoList',{id:id,name:newName}).catch(function(e){
    var ll=todoListsCache.find(function(l){return l.id===id});
    if(ll){ll.name=prev;saveTodoCache();renderTodoBoard()}
    showToast('이름 변경 실패: '+e.message);
  });
}

function openTodoListMenu(event,listId){
  event.stopPropagation();
  var overlay=document.getElementById('todoListMenuOverlay');
  var menu=document.getElementById('todoListMenu');
  menu.innerHTML='<button onclick="closeTodoListMenu();renameTodoList(\''+escapeHtml(listId)+'\')">이름 변경</button>'
    +'<button onclick="closeTodoListMenu();cycleTodoListColor(\''+escapeHtml(listId)+'\')">색상 변경</button>'
    +'<button class="danger" onclick="closeTodoListMenu();removeTodoList(\''+escapeHtml(listId)+'\')">리스트 삭제</button>';
  // 클릭 위치에 메뉴 배치
  var rect=event.target.getBoundingClientRect();
  menu.style.top=(rect.bottom+4)+'px';
  menu.style.left=Math.max(10,rect.right-140)+'px';
  overlay.classList.add('open');
}

function closeTodoListMenu(e){
  if(e && e.target!==document.getElementById('todoListMenuOverlay'))return;
  document.getElementById('todoListMenuOverlay').classList.remove('open');
}

function cycleTodoListColor(id){
  var l=todoListsCache.find(function(l){return l.id===id});
  if(!l)return;
  var colors=['mint','sky','rose','gold','accent','lavender'];
  var i=colors.indexOf(l.color||'accent');
  var nextColor=colors[(i+1)%colors.length];
  var prev=l.color;
  l.color=nextColor;saveTodoCache();renderTodoBoard();
  apiWrite('updateTodoList',{id:id,color:nextColor}).catch(function(e){
    var ll=todoListsCache.find(function(l){return l.id===id});
    if(ll){ll.color=prev;saveTodoCache();renderTodoBoard()}
    showToast('색상 변경 실패: '+e.message);
  });
}

function removeTodoList(id){
  var l=todoListsCache.find(function(l){return l.id===id});
  if(!l)return;
  var itemCount=todosCache.filter(function(t){return t.listId===id}).length;
  var msg=itemCount>0?'"'+l.name+'" 리스트와 안의 항목 '+itemCount+'개를 모두 삭제할까요?':'"'+l.name+'" 리스트를 삭제할까요?';
  if(!confirm(msg))return;
  // 낙관적 삭제
  var listIdx=todoListsCache.findIndex(function(l){return l.id===id});
  var removedList=todoListsCache.splice(listIdx,1)[0];
  var removedTodos=todosCache.filter(function(t){return t.listId===id});
  todosCache=todosCache.filter(function(t){return t.listId!==id});
  saveTodoCache();renderTodoBoard();
  apiWrite('deleteTodoList',null,id).catch(function(e){
    todoListsCache.splice(listIdx,0,removedList);
    todosCache=todosCache.concat(removedTodos);
    saveTodoCache();renderTodoBoard();
    showToast('삭제 실패: '+e.message);
  });
}

function syncCalendar(){
  var b=document.getElementById('syncBtn');b.disabled=true;b.textContent='동기화 중…';
  apiWrite('syncCalendar').then(function(r){var n=(r.results&&r.results.sheetsToCalendar?r.results.sheetsToCalendar.synced:0)+(r.results&&r.results.calendarToSheets?r.results.calendarToSheets.synced:0);showToast(n+'건 동기화 완료');switchTab(document.querySelector('.tab.active').dataset.tab)}).catch(function(e){showToast('동기화 오류: '+e.message)}).finally(function(){b.disabled=false;b.textContent='동기화'});
}

function closeForm(id){document.getElementById(id).classList.remove('open')}
function setSaveBtn(oid,loading){var b=document.querySelector('#'+oid+' .btn-primary');if(!b)return;if(loading){b.dataset.orig=b.textContent;b.textContent='저장 중…';b.disabled=true}else{b.textContent=b.dataset.orig||'저장';b.disabled=false}}

document.querySelectorAll('#daySelector .day-toggle').forEach(function(b){b.addEventListener('click',function(){b.classList.toggle('selected')})});
